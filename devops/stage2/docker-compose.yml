services:
  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    # No `ports:` block → Redis is reachable only inside app-network
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "128M"
    restart: unless-stopped

  # ── API (FastAPI) ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      REDIS_HOST: "${REDIS_HOST}"
      REDIS_PORT: "${REDIS_PORT}"
      API_HOST: "${API_HOST}"
      API_PORT: "${API_PORT}"
      LOG_LEVEL: "${LOG_LEVEL}"
    networks:
      - app-network
    ports:
      - "${API_PORT}:${API_PORT}"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - |
          import urllib.request, sys
          urllib.request.urlopen('http://localhost:8000/health')
          sys.exit(0)
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: "256M"
    restart: unless-stopped

  # ── Worker ────────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      REDIS_HOST: "${REDIS_HOST}"
      REDIS_PORT: "${REDIS_PORT}"
      WORKER_CONCURRENCY: "${WORKER_CONCURRENCY}"
      LOG_LEVEL: "${LOG_LEVEL}"
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
    # Healthcheck is defined in the Dockerfile (Redis PING probe).
    # Compose picks it up automatically; override only if you need
    # different timings per environment.
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: "256M"
    restart: unless-stopped

  # ── Frontend (Node.js) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      API_URL: "${API_URL}"
      PORT: "${FRONTEND_PORT}"
    networks:
      - app-network
    ports:
      # Only the frontend is reachable from the host
      - "${FRONTEND_HOST_PORT}:${FRONTEND_PORT}"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${FRONTEND_PORT}/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "128M"
    restart: unless-stopped

# ── Networks ──────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
    # internal: true  ← uncomment to completely block internet access
    #                    for all containers (useful in air-gapped envs)
